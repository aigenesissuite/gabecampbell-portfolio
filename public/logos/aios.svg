<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    aiOS Constellation Mark — Round constellation dots (CEO 2026-07-06), liquid glass (lg-container style)
    data-ring: 0=core 1=inner 2=mid 3=edge for animation targeting
    19 round dots, columns: 3-4-5-4-3
  -->

  <defs>
    <filter id="glass" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="shadow"/>
      <feOffset dx="0" dy="2" in="shadow" result="offShadow"/>
      <feFlood flood-color="rgba(0,0,0,0.12)" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offShadow" operator="in" result="dropShadow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="glow"/>
      <feFlood flood-color="rgba(0,0,0,0.06)" result="glowColor"/>
      <feComposite in="glowColor" in2="glow" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="dropShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Col 1 (3) -->
  <g class="dot edge" data-ring="3" filter="url(#glass)">
    <circle cx="52" cy="72" r="3.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="52" cy="100" r="4" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot edge" data-ring="3" filter="url(#glass)">
    <circle cx="52" cy="128" r="3.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>

  <!-- Col 2 (4) -->
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="76" cy="58" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="76" cy="86" r="6" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="76" cy="114" r="6" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="76" cy="142" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>

  <!-- Col 3 (5) -->
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="100" cy="44" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="100" cy="72" r="6.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot core" data-ring="0" filter="url(#glass)">
    <circle cx="100" cy="100" r="8" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="100" cy="128" r="6.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="100" cy="156" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>

  <!-- Col 4 (4) -->
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="124" cy="58" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="124" cy="86" r="6" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot inner" data-ring="1" filter="url(#glass)">
    <circle cx="124" cy="114" r="6" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="124" cy="142" r="5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>

  <!-- Col 5 (3) -->
  <g class="dot edge" data-ring="3" filter="url(#glass)">
    <circle cx="148" cy="72" r="3.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot mid" data-ring="2" filter="url(#glass)">
    <circle cx="148" cy="100" r="4" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
  <g class="dot edge" data-ring="3" filter="url(#glass)">
    <circle cx="148" cy="128" r="3.5" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>
  </g>
</svg>
